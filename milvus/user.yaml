# Extra config to override default milvus.yaml
# Milvus Authentication Configuration

common:
  security:
    # Enable authorization/authentication
    authorizationEnabled: true
    
    # TLS configuration (optional)
    tlsMode: 0  # 0=disabled, 1=one-way, 2=two-way

# Root user credentials (will be created on first startup with auth enabled)
# Default: root / Milvus
# Change the password after first login for security

# Additional security settings
proxy:
  # Request timeout
  timeTickInterval: 200

log:
  level: info

# Performance tuning
dataCoord:
  enableCompaction: true

queryNode:
  cacheSize: 16  # GB
