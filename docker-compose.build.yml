version: '3.8'

services:
  python-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: crpi-srv542vpdq3agniz.cn-chengdu.personal.cr.aliyuncs.com/personal_ai_dev/python-app:python3.11
    container_name: python-app
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - PORT=8000
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge 